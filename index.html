                              <div style={{ fontSize: 13, lineHeight: 1.35, color: "#0b0c0c" }}>{ch.desc.length > 80 ? ch.desc.substring(0, 77) + "\u2026" : ch.desc}</div>
                            </a>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
          {drillPath.length > 0 && (
            <div style={{ padding: "20px" }}>
              <Breadcrumb path={breadcrumbPath} onNavigate={navigateTo} />
              <h3 style={{ fontSize: 24, fontWeight: 700, margin: "0 0 4px", color: "#0b0c0c" }}>{getDrillTitle(currentCode)}</h3>
              <p style={{ fontSize: 14, color: "#505a5f", margin: "0 0 16px" }}>Commodity code: {currentCode}</p>

                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 8 }}>
                  {children.map(function(item) {
                    var hasDrill = getDrillChildren(item.code) !== null || isTradeDataLeaf(item.code);
                    return (
                      <a key={item.code} href="#" onClick={function(e) { e.preventDefault(); handleClick(item.code); }} style={{
                        display: "block", padding: "12px 14px", background: "#fff", border: "1px solid #b1b4b6",
                        textDecoration: "none", color: "#0b0c0c", borderLeft: "4px solid #1d70b8",
                      }}>
                        <div style={{ fontSize: 20, fontWeight: 700, color: "#1d70b8", marginBottom: 4 }}>{item.code} {hasDrill && <span style={{ fontSize: 14 }}>{"\u203a"}</span>}</div>
                        <div style={{ fontSize: 13, lineHeight: 1.35, color: "#0b0c0c" }}>{item.desc.length > 100 ? item.desc.substring(0, 97) + "\u2026" : item.desc}</div>
                      </a>
                    );
                  })}
                </div>
              )}
              {!children && isTradeDataLeaf(currentCode) && <TradeDataView data={getTradeData(currentCode)} />}
                {!children && !isTradeDataLeaf(currentCode) && <DemoBadge />}
            </div>
          )}
        </div>
      );
    }

          <div style={{ padding: "12px 20px", borderBottom: "1px solid #b1b4b6" }}>

                  <ul style={{ margin: 0, padding: 0, listStyle: "none" }}>

    // OPTION E: Guided Cascading Filters — adapted from Defra fish exports
    function PreviewE() {
      const [speciesQuery, setSpeciesQuery] = useState("");
      const [selectedSpecies, setSelectedSpecies] = useState(null);
      const [showSuggestions, setShowSuggestions] = useState(false);
      const [selectedCategory, setSelectedCategory] = useState("");
      const [selectedSub, setSelectedSub] = useState("");
      const [showResult, setShowResult] = useState(false);

      var speciesOptions = [
        { id: "horses", label: "Live horses, asses, mules and hinnies", code: "0101" },
        { id: "bovine", label: "Live bovine animals", code: "0102" },
        { id: "swine", label: "Live swine", code: "0103" },
        { id: "sheep", label: "Live sheep and goats", code: "0104" },
        { id: "poultry", label: "Live poultry", code: "0105" },
        { id: "other", label: "Other live animals", code: "0106" },
      ];

      var categoryOptions = {
        horses: [
          { value: "breeding", label: "Pure-bred breeding horses" },
          { value: "other_horses", label: "Other live horses (excl. pure-bred breeding)" },
          { value: "asses", label: "Live asses" },
          { value: "mules", label: "Live mules and hinnies" },
        ],
      };

      var subOptions = {
        other_horses: [
          { value: "01012910", label: "For slaughter" },
          { value: "01012990", label: "Other (excl. breeding and slaughter)" },
        ],
      };

      var filtered = speciesQuery.length >= 2 ? speciesOptions.filter(function(s) {
        return s.label.toLowerCase().indexOf(speciesQuery.toLowerCase()) >= 0 || s.code.indexOf(speciesQuery) === 0;
      }) : [];

      var cats = selectedSpecies ? (categoryOptions[selectedSpecies.id] || []) : [];
      var subs = selectedCategory ? (subOptions[selectedCategory] || []) : [];

      function selectSpecies(sp) {
        setSelectedSpecies(sp);
        setSpeciesQuery(sp.label + " (" + sp.code + ")");
        setShowSuggestions(false);
        setSelectedCategory("");
        setSelectedSub("");
        setShowResult(false);
      }

      function handleCatChange(val) {
        setSelectedCategory(val);
        setSelectedSub("");
        setShowResult(false);
        if (val && !subOptions[val]) {
          setShowResult(true);
        }
      }

      function handleSubChange(val) {
        setSelectedSub(val);
        if (val) setShowResult(true);
      }

      function resolvedCode() {
        if (selectedSub) return selectedSub;
        if (selectedCategory === "breeding") return "010121";
        if (selectedCategory === "asses") return "010130";
        if (selectedCategory === "mules") return "010190";
        return selectedSpecies ? selectedSpecies.code : "";
      }

      function resolvedLabel() {
        if (selectedSub) {
          var s = (subOptions[selectedCategory] || []).find(function(x) { return x.value === selectedSub; });
          return s ? s.label : "";
        }
        if (selectedCategory) {
          var c = cats.find(function(x) { return x.value === selectedCategory; });
          return c ? c.label : "";
        }
        return "";
      }

      return (
        <div style={{ border: "2px solid #0b0c0c", background: "#fff", maxHeight: 600, overflow: "auto" }}>
          <div style={{ background: "#0b0c0c", padding: "10px 20px" }}><span style={{ color: "#fff", fontSize: 16, fontWeight: 700 }}>GOV.UK</span></div>
          <div style={{ padding: "24px 20px" }}>
            <h3 style={{ fontSize: 28, fontWeight: 700, margin: "0 0 8px", color: "#0b0c0c" }}>Find commodity data</h3>
            <p style={{ fontSize: 16, color: "#505a5f", margin: "0 0 20px" }}>Search for a commodity by name or code, then narrow your selection.</p>

            <div style={{ padding: "20px", border: "1px solid #b1b4b6", background: "#fff" }}>
              <div style={{ marginBottom: 20 }}>
                <label style={{ display: "block", fontWeight: 700, fontSize: 16, marginBottom: 4 }}>Commodity name or HS code</label>
                <div style={{ fontSize: 14, color: "#505a5f", marginBottom: 6 }}>For example, horses or 0101</div>
                <div style={{ position: "relative" }}>
                  <input type="text" value={speciesQuery} onChange={function(e) { setSpeciesQuery(e.target.value); setShowSuggestions(true); setSelectedSpecies(null); setSelectedCategory(""); setSelectedSub(""); setShowResult(false); }} onFocus={function() { setShowSuggestions(true); }} style={{ width: "100%", maxWidth: 440, padding: "8px 10px", fontSize: 16, border: "2px solid #0b0c0c", boxSizing: "border-box" }} />
                  {showSuggestions && filtered.length > 0 && (
                    <ul style={{ position: "absolute", top: "100%", left: 0, width: "100%", maxWidth: 440, margin: 0, padding: 0, listStyle: "none", border: "2px solid #0b0c0c", borderTop: "none", background: "#fff", zIndex: 10 }}>
                      {filtered.map(function(sp, i) {
                        return (
                          <li key={sp.id}>
                            <button onClick={function() { selectSpecies(sp); }} style={{ display: "block", width: "100%", padding: "10px 12px", textAlign: "left", background: i === 0 ? "#1d70b8" : "#fff", color: i === 0 ? "#fff" : "#0b0c0c", border: "none", borderBottom: "1px solid #dee0e2", cursor: "pointer", fontSize: 15 }}>
                              {sp.label} <span style={{ color: i === 0 ? "#d0e0f0" : "#505a5f", fontSize: 13 }}>({sp.code})</span>
                            </button>
                          </li>
                        );
                      })}
                    </ul>
                  )}
                </div>
                <details style={{ marginTop: 8 }}>
                  <summary style={{ color: "#1d70b8", fontSize: 14, cursor: "pointer" }}>I cannot find the commodity</summary>
                  <div style={{ padding: "8px 0 0 16px", fontSize: 14, color: "#505a5f" }}>Try searching by HS chapter code (e.g. 01, 02) or browse the full list on the <a href="#" style={{ color: "#1d70b8" }}>commodity code lookup</a> page.</div>
                </details>
              </div>

              {selectedSpecies && cats.length > 0 && (
                <div style={{ marginBottom: 20 }}>
                  <label style={{ display: "block", fontWeight: 700, fontSize: 16, marginBottom: 4 }}>Category</label>
                  <select value={selectedCategory} onChange={function(e) { handleCatChange(e.target.value); }} style={{ width: "100%", maxWidth: 440, padding: "8px 10px", fontSize: 16, border: "2px solid #0b0c0c" }}>
                    <option value="">Select...</option>
                    {cats.map(function(c) { return <option key={c.value} value={c.value}>{c.label}</option>; })}
                  </select>
                </div>
              )}

              {selectedCategory && subs.length > 0 && (
                <div style={{ marginBottom: 20 }}>
                  <label style={{ display: "block", fontWeight: 700, fontSize: 16, marginBottom: 4 }}>Sub-category</label>
                  <select value={selectedSub} onChange={function(e) { handleSubChange(e.target.value); }} style={{ width: "100%", maxWidth: 440, padding: "8px 10px", fontSize: 16, border: "2px solid #0b0c0c" }}>
                    <option value="">Select...</option>
                    {subs.map(function(s) { return <option key={s.value} value={s.value}>{s.label}</option>; })}
                  </select>
                </div>
              )}

              {showResult && (
                <div style={{ padding: "12px 16px", background: "#e8f0fe", border: "1px solid #1d70b8", borderLeft: "4px solid #1d70b8" }}>
                  <div style={{ fontSize: 14, color: "#505a5f", marginBottom: 4 }}>Commodity code</div>
                  <div style={{ fontSize: 18, fontWeight: 700, color: "#0b0c0c" }}>{resolvedCode()} — {resolvedLabel()}</div>
                  <div style={{ marginTop: 8 }}>
                    <a href="#" onClick={function(e) { e.preventDefault(); }} style={{ color: "#1d70b8", fontSize: 14 }}>View trade data for this commodity →</a>
                  </div>
                </div>
              )}

              {!selectedSpecies && !showResult && (
                <div style={{ padding: "12px 16px", background: "#f3f2f1", border: "1px solid #b1b4b6", borderLeft: "4px solid #f47738", fontSize: 13, color: "#505a5f" }}>
                  <strong style={{ color: "#f47738" }}>Demo note: </strong>
                  This preview demonstrates the cascading filter pattern from the live Defra fish exports service (manage-fish-exports.service.gov.uk), adapted for commodity data. Type "horses", "live", or "01" to start. Category and sub-category dropdowns appear based on selection. Data is loaded for Chapter 01 headings only.
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

                            <td style={{ padding: "10px", textAlign: "center", borderBottom: "1px solid #f3f2f1", fontWeight: 700 }}>{totalGDS(o.gds_scores)}</td>
                            <td style={{ padding: "10px", textAlign: "center", borderBottom: "1px solid #f3f2f1" }}><span style={{ color: "#00703c", fontWeight: 700 }}>{wcagPass(o.wcag_status)}</span>/10</td>
                            <td style={{ padding: "10px", textAlign: "center", borderBottom: "1px solid #f3f2f1" }}>{wcagFail(o.wcag_status) > 0 ? <span style={{ color: "#d4351c", fontWeight: 700 }}>{wcagFail(o.wcag_status)}</span> : <span style={{ color: "#00703c" }}>0</span>}</td>
                            <td style={{ padding: "10px", textAlign: "center", borderBottom: "1px solid #f3f2f1" }}>{o.id === "A" ? "Partial" : o.id === "B" ? "\u2713 Full" : "\u2717 Custom"}</td>
                            <td style={{ padding: "10px", textAlign: "center", borderBottom: "1px solid #f3f2f1" }}>{(o.id === "A" || o.id === "B") ? <span style={{ color: "#00703c", fontWeight: 700 }}>{"\u2713"}</span> : <span style={{ color: "#d4351c", fontWeight: 700 }}>{"\u2717"}</span>}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>

                {/* A11y deep-dive per option */}
                <h3 style={{ fontSize: 20, fontWeight: 700, marginBottom: 12 }}>Accessibility analysis per option</h3>
                {OPT_DATA.map(function(o) {
                  return (
                    <div key={o.id} style={{ border: "1px solid #b1b4b6", marginBottom: 8, background: "#fff" }}>
                      <button onClick={function() { setExpandedOpt(expandedOpt === o.id ? null : o.id); }} aria-expanded={expandedOpt === o.id} style={{ width: "100%", display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 16px", background: "none", border: "none", cursor: "pointer", textAlign: "left" }}>
                        <span>
                          <span style={{ display: "inline-block", width: 8, height: 8, borderRadius: "50%", background: o.color, marginRight: 8 }} />
                          <span style={{ fontWeight: 700, fontSize: 16 }}>{o.id}. {o.label}</span>
                          <span style={{ fontSize: 13, color: "#505a5f", marginLeft: 8 }}>\u2014 {o.verdict}</span>
                        </span>
                        <span style={{ color: "#1d70b8", textDecoration: "underline", fontSize: 14 }}>{expandedOpt === o.id ? "Hide" : "Show"}</span>
                      </button>
                      {expandedOpt === o.id && (
                        <div style={{ padding: "0 16px 16px" }}>
                          <p style={{ fontSize: 14, color: "#505a5f", marginTop: 0, lineHeight: 1.5 }}>{o.approach}</p>
                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginTop: 12 }}>
                            <div style={{ padding: 12, background: "#e8f0fe", border: "1px solid #b1b4b6" }}>
                              <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 8 }}>{"\u2713"} Accessibility strengths</div>
                              {o.a11y_good.map(function(g, i) { return <p key={i} style={{ fontSize: 13, margin: "0 0 6px", lineHeight: 1.45 }}>{g}</p>; })}
                            </div>
                            <div style={{ padding: 12, background: "#f6d7d2", border: "1px solid #b1b4b6" }}>
                              <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 8 }}>{"\u2717"} Accessibility concerns</div>
                              {o.a11y_bad.map(function(b, i) { return <p key={i} style={{ fontSize: 13, margin: "0 0 6px", lineHeight: 1.45 }}>{b}</p>; })}
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {/* ====== GDS PRINCIPLES ====== */}
            {activeTab === "gds" && (
              <div>
                <h2 style={{ fontSize: 24, fontWeight: 700, margin: "0 0 8px" }}>GDS Design Principles Assessment</h2>
                <p style={{ fontSize: 16, color: "#505a5f", marginBottom: 20 }}>Scored 1\u20135 against all 11 principles (including Principle 11: Minimise environmental impact, added April 2025).</p>
                <div style={{ background: "#fff", border: "1px solid #b1b4b6", overflowX: "auto" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13, minWidth: 700 }}>
                    <thead>
                      <tr style={{ background: "#0b0c0c", color: "#fff" }}>
                        <th style={{ padding: "10px 12px", textAlign: "left", width: "35%" }}>Principle</th>
                        {OPT_DATA.map(function(o) { return <th key={o.id} style={{ padding: "10px 8px", textAlign: "center", background: o.id === VOTE ? "#1d70b8" : "#0b0c0c" }}>{o.id}</th>; })}
                      </tr>
                    </thead>
                    <tbody>
                      {GDS_PRINCIPLES.map(function(p, i) {
                        return (
                          <tr key={p.id} style={{ background: i % 2 === 0 ? "#f3f2f1" : "#fff" }}>
                            <td style={{ padding: "8px 12px", borderBottom: "1px solid #dee0e2" }}><strong>{p.id}.</strong> {p.name}</td>
                            {OPT_DATA.map(function(o) { return <td key={o.id} style={{ padding: "8px", textAlign: "center", borderBottom: "1px solid #dee0e2" }}><SBar score={o.gds_scores[i]} color={o.color} /></td>; })}
                          </tr>
                        );
                      })}
                      <tr style={{ background: "#0b0c0c", color: "#fff", fontWeight: 700 }}>
                        <td style={{ padding: "10px 12px" }}>TOTAL (/55)</td>
                        {OPT_DATA.map(function(o) { return <td key={o.id} style={{ padding: "10px 8px", textAlign: "center", fontSize: 18, color: o.id === VOTE ? "#a3d9a5" : "#fff" }}>{totalGDS(o.gds_scores)}</td>; })}
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* ====== WCAG ====== */}
            {activeTab === "wcag" && (
              <div>
                <h2 style={{ fontSize: 24, fontWeight: 700, margin: "0 0 8px" }}>WCAG 2.2 Level AA Compliance</h2>
                <div style={{ padding: "12px 16px", borderLeft: "4px solid #f47738", background: "#fff", marginBottom: 20, fontSize: 14 }}>
                  <strong>Legal context:</strong> The Public Sector Bodies Accessibility Regulations 2018 require WCAG 2.2 AA. GDS monitoring active since October 2024. HMRC services are within scope.
                </div>
                <div style={{ background: "#fff", border: "1px solid #b1b4b6", overflowX: "auto" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13, minWidth: 700 }}>
                    <thead>
                      <tr style={{ background: "#0b0c0c", color: "#fff" }}>
                        <th style={{ padding: "10px 12px", textAlign: "left", width: "30%" }}>Criterion</th>
                        <th style={{ padding: "10px 8px", textAlign: "center", width: "8%" }}>WCAG</th>
                        {OPT_DATA.map(function(o) { return <th key={o.id} style={{ padding: "10px 8px", textAlign: "center", background: o.id === VOTE ? "#1d70b8" : "#0b0c0c" }}>{o.id}</th>; })}
                      </tr>
                    </thead>
                    <tbody>
                      {WCAG_CRITERIA.map(function(c, i) {
                        return (
                          <tr key={c.id} style={{ background: i % 2 === 0 ? "#f3f2f1" : "#fff" }}>
                            <td style={{ padding: "8px 12px", borderBottom: "1px solid #dee0e2", fontWeight: 600 }}>{c.name}</td>
                            <td style={{ padding: "8px", textAlign: "center", borderBottom: "1px solid #dee0e2", fontSize: 11, color: "#505a5f" }}>{c.wcag}</td>
                            {OPT_DATA.map(function(o) { return <td key={o.id} style={{ padding: "8px", textAlign: "center", borderBottom: "1px solid #dee0e2" }}><WBadge status={o.wcag_status[i]} /></td>; })}
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12, marginTop: 20 }}>
                  {OPT_DATA.map(function(o) {
                    var p = wcagPass(o.wcag_status); var f = wcagFail(o.wcag_status);
                    return (
                      <div key={o.id} style={{ padding: 16, background: "#fff", border: o.id === VOTE ? "3px solid #00703c" : "1px solid #b1b4b6", textAlign: "center" }}>
                        <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 8 }}>Option {o.id}</div>
                        <div style={{ fontSize: 28, fontWeight: 700, color: f === 0 ? "#00703c" : "#d4351c" }}>{p}/10</div>
                        <div style={{ fontSize: 12, color: "#505a5f" }}>criteria passed</div>
                        {f > 0 && <div style={{ marginTop: 8, fontSize: 12, color: "#d4351c", fontWeight: 700 }}>{f} FAIL{f > 1 ? "S" : ""} \u2014 legal risk</div>}
                        {f === 0 && <div style={{ marginTop: 8 }}><Tag color="green">COMPLIANT</Tag></div>}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* ====== OPTION PREVIEWS ====== */}
            {["optionA", "optionB", "optionC", "optionD", "optionE"].indexOf(activeTab) >= 0 && (function() {
              var optId = activeTab.charAt(6);
              var opt = OPT_DATA.find(function(o) { return o.id === optId; });
              var Preview = { A: PreviewA, B: PreviewB, C: PreviewC, D: PreviewD, E: PreviewE }[optId];
              return (
                <div>
                  <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
                    <h2 style={{ fontSize: 24, fontWeight: 700, margin: 0 }}>Option {opt.id}: {opt.label}</h2>
                    {opt.id === VOTE && <Tag color="green">RECOMMENDED</Tag>}
                  </div>
                  <p style={{ fontSize: 16, color: "#505a5f", marginBottom: 4 }}>{opt.subtitle}</p>
                  <p style={{ fontSize: 15, lineHeight: 1.5, marginBottom: 16 }}>{opt.approach}</p>

                  {/* Scores summary */}
                  <div style={{ display: "flex", gap: 16, marginBottom: 20, flexWrap: "wrap" }}>
                    <div style={{ padding: "10px 16px", background: "#fff", border: "1px solid #b1b4b6" }}>
                      <div style={{ fontSize: 12, color: "#505a5f" }}>GDS Principles</div>
                      <div style={{ fontSize: 24, fontWeight: 700 }}>{totalGDS(opt.gds_scores)}<span style={{ fontSize: 14, fontWeight: 400 }}>/55</span></div>
                    </div>
                    <div style={{ padding: "10px 16px", background: "#fff", border: "1px solid #b1b4b6" }}>
                      <div style={{ fontSize: 12, color: "#505a5f" }}>WCAG Pass</div>
                      <div style={{ fontSize: 24, fontWeight: 700, color: wcagFail(opt.wcag_status) === 0 ? "#00703c" : "#d4351c" }}>{wcagPass(opt.wcag_status)}<span style={{ fontSize: 14, fontWeight: 400 }}>/10</span></div>
                    </div>
                    <div style={{ padding: "10px 16px", background: "#fff", border: "1px solid #b1b4b6" }}>
                      <div style={{ fontSize: 12, color: "#505a5f" }}>WCAG Fails</div>
                      <div style={{ fontSize: 24, fontWeight: 700, color: wcagFail(opt.wcag_status) > 0 ? "#d4351c" : "#00703c" }}>{wcagFail(opt.wcag_status)}</div>
                    </div>
                    <div style={{ padding: "10px 16px", background: "#fff", border: "1px solid #b1b4b6" }}>
                      <div style={{ fontSize: 12, color: "#505a5f" }}>Progressive Enhancement</div>
                      <div style={{ fontSize: 24, fontWeight: 700, color: (opt.id === "A" || opt.id === "B") ? "#00703c" : "#d4351c" }}>{(opt.id === "A" || opt.id === "B") ? "\u2713" : (opt.id === "E" ? "~" : "\u2717")}</div>
                    </div>
                  </div>

                  {/* Interactive preview */}
                  <h3 style={{ fontSize: 18, fontWeight: 700, margin: "0 0 8px" }}>Interactive preview {opt.id !== "E" ? "(" + ALL_CHAPTERS.length + " chapters, live data + drill-down)" : "(cascading filter demo)"}</h3>
                  <p style={{ fontSize: 13, color: "#505a5f", margin: "0 0 8px" }}>{opt.id !== "E" ? "Click Chapter 01 (Live animals) to demo drill-down navigation through headings and subheadings." : "Type \u201chorses\u201d, \u201clive\u201d, or \u201c01\u201d to start the cascading filter. Category and sub-category dropdowns narrow to a specific commodity code."}</p>
                  <Preview />

                  {/* A11y analysis */}
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginTop: 20 }}>
                    <div style={{ padding: 16, background: "#e8f0fe", border: "1px solid #b1b4b6" }}>
                      <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 8, color: "#00703c" }}>{"\u2713"} Accessibility strengths</div>
                      {opt.a11y_good.map(function(g, i) { return <p key={i} style={{ fontSize: 14, margin: "0 0 8px", lineHeight: 1.5 }}>{g}</p>; })}
                    </div>
                    <div style={{ padding: 16, background: "#f6d7d2", border: "1px solid #b1b4b6" }}>
                      <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 8, color: "#d4351c" }}>{"\u2717"} Accessibility concerns</div>
                      {opt.a11y_bad.map(function(b, i) { return <p key={i} style={{ fontSize: 14, margin: "0 0 8px", lineHeight: 1.5 }}>{b}</p>; })}
                    </div>
                  </div>
                </div>
              );
            })()}

            {/* ====== VERDICT ====== */}
            {activeTab === "verdict" && (
              <div>
                <h2 style={{ fontSize: 24, fontWeight: 700, margin: "0 0 16px" }}>Recommendation: Option B</h2>
                <div style={{ padding: "20px 24px", background: "#fff", borderLeft: "4px solid #00703c", marginBottom: 24 }}>
                  <h3 style={{ fontSize: 20, fontWeight: 700, margin: "0 0 12px", color: "#00703c" }}>Option B \u2014 GDS Accordion + Enhanced Search</h3>
                  <p style={{ fontSize: 16, lineHeight: 1.6, margin: "0 0 12px" }}>When accessibility is the primary filter \u2014 as it must be for a public sector service \u2014 the decision becomes clear. Option B is the only redesign that:</p>
                  <p style={{ fontSize: 15, lineHeight: 1.6, margin: "0 0 8px" }}><strong>1. Uses GOV.UK Design System components exclusively.</strong> The accordion, text input, and button have all been tested by GDS against WCAG 2.2 AA with JAWS, NVDA, VoiceOver, Dragon NaturallySpeaking, TalkBack, and ZoomText.</p>
                  <p style={{ fontSize: 15, lineHeight: 1.6, margin: "0 0 8px" }}><strong>2. Passes all WCAG 2.2 AA criteria assessed.</strong> Options C and D both introduce progressive enhancement failures. Option B's accordion degrades to expanded sections.</p>
                  <p style={{ fontSize: 15, lineHeight: 1.6, margin: "0 0 8px" }}><strong>3. Follows progressive enhancement.</strong> HTML first, CSS for layout, JS for interactivity.</p>
                  <p style={{ fontSize: 15, lineHeight: 1.6, margin: 0 }}><strong>4. Reduces cognitive load for AT users.</strong> {HS_SECTIONS.length} section headings instead of {ALL_CHAPTERS.length} undifferentiated links.</p>
                </div>

                {/* Comparison table */}
                <div style={{ background: "#fff", border: "1px solid #b1b4b6", overflow: "hidden", marginBottom: 24, overflowX: "auto" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 14, minWidth: 600 }}>
                    <thead>
                      <tr style={{ background: "#0b0c0c", color: "#fff" }}>
                        <th style={{ padding: "10px 14px", textAlign: "left" }}>Dimension</th>
                        {OPT_DATA.map(function(o) { return <th key={o.id} style={{ padding: "10px 8px", textAlign: "center", background: o.id === VOTE ? "#00703c" : "#0b0c0c" }}>{o.id}</th>; })}
                      </tr>
                    </thead>
                    <tbody>
                      {[
                        { label: "GDS Principles (/55)", values: OPT_DATA.map(function(o) { return totalGDS(o.gds_scores); }) },
                        { label: "WCAG criteria passed (/10)", values: OPT_DATA.map(function(o) { return wcagPass(o.wcag_status); }) },
                        { label: "Uses GDS components", values: ["Partial", "Full", "None", "None", "Full"] },
                        { label: "Progressive enhancement", values: ["\u2713", "\u2713", "\u2717", "\u2717", "~"] },
                        { label: "Screen reader experience", values: ["Poor", "Excellent", "Untested", "Risky", "Good"] },
                        { label: "Supports open browsing", values: ["\u2713", "\u2713", "\u2713", "\u2713", "\u2717"] },
                        { label: "Build risk", values: ["None", "Low", "Medium", "High", "Low"] },
                      ].map(function(row, i) {
                        return (
                          <tr key={i} style={{ background: i % 2 === 0 ? "#f3f2f1" : "#fff" }}>
                            <td style={{ padding: "8px 14px", fontWeight: 600, borderBottom: "1px solid #dee0e2" }}>{row.label}</td>
                            {row.values.map(function(v, j) { return <td key={j} style={{ padding: "8px", textAlign: "center", borderBottom: "1px solid #dee0e2", fontWeight: j === 1 ? 700 : 400, color: v === "\u2717" ? "#d4351c" : (v === "\u2713" || v === "Excellent" || v === "Full") ? "#00703c" : "#0b0c0c" }}>{v}</td>; })}
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>

                <div style={{ padding: "16px 20px", borderLeft: "4px solid #f47738", background: "#fff", marginBottom: 24 }}>
                  <h3 style={{ fontSize: 16, fontWeight: 700, margin: "0 0 8px" }}>Why the recommendation changed from the first review</h3>
                  <p style={{ fontSize: 14, lineHeight: 1.6, margin: "0 0 8px" }}>The initial review recommended Option C (Card Grid) based on visual scannability and information density. When reassessed with GDS standards and accessibility as the primary criterion, that recommendation was wrong. The card grid is not a GOV.UK Design System component, has no GDS accessibility testing heritage, fails progressive enhancement, and introduces untested focus/hover states. <strong>Option B delivers 80% of the scannability improvement through HS Section grouping while carrying zero accessibility risk.</strong></p>
                </div>

                <div style={{ padding: "16px 20px", borderLeft: "4px solid #d4351c", background: "#fff", marginBottom: 24 }}>
                  <h3 style={{ fontSize: 16, fontWeight: 700, margin: "0 0 8px" }}>What about Option E (Cascading Filters)?</h3>
                  <p style={{ fontSize: 14, lineHeight: 1.6, margin: "0 0 8px" }}>Option E, adapted from the live Defra fish exports service, scores highly on GDS compliance (47/55) and uses only standard GDS form components. It excels at task-based lookup where users already know roughly what they're looking for. However, uktradeinfo.com/find-commodity-data serves a dual purpose: users sometimes search for a known commodity, but also browse and explore the taxonomy to discover what codes exist. Option E provides no browsing path \u2014 users must type a term to begin.</p>
                  <p style={{ fontSize: 14, lineHeight: 1.6, margin: 0 }}><strong>Option E could complement Option B as a secondary interaction mode</strong> (search-first vs browse-first), but should not replace browsing altogether. Consider adding Option E's cascading search as the enhanced autocomplete in Phase 2 of the implementation pathway.</p>
                </div>

                <div style={{ padding: "16px 20px", background: "#fff", border: "1px solid #b1b4b6" }}>
                  <h3 style={{ fontSize: 18, fontWeight: 700, margin: "0 0 12px" }}>Recommended implementation pathway</h3>
                  <p style={{ fontSize: 14, lineHeight: 1.6, margin: "0 0 8px" }}><strong>Phase 1:</strong> Map the {ALL_CHAPTERS.length} chapters to {HS_SECTIONS.length} sections (the mapping used in this paper is ready to use). Implement using GOV.UK Frontend v5.x accordion. Test with axe-core, html-validate, JAWS + NVDA.</p>
                  <p style={{ fontSize: 14, lineHeight: 1.6, margin: "0 0 8px" }}><strong>Phase 2:</strong> Add accessible autocomplete using the GDS accessible-autocomplete component, incorporating Option E's cascading filter pattern for users who prefer search-first interaction. This provides typeahead with full ARIA support and progressive narrowing via dependent dropdowns.</p>
                  <p style={{ fontSize: 14, lineHeight: 1.6, margin: 0 }}><strong>Phase 3:</strong> Measure with data (GDS Principle 3). Track which sections are opened most, what search terms are entered, and whether users find what they need. Iterate from there.</p>
                </div>
              </div>
            )}
          </div>

          {/* Footer */}
          <div style={{ background: "#f3f2f1", borderTop: "1px solid #b1b4b6", padding: "20px 0" }}>
            <div style={{ maxWidth: 960, margin: "0 auto", padding: "0 20px", fontSize: 13, color: "#505a5f" }}>
              Design review prepared against GDS Design Principles (v11, April 2025), WCAG 2.2 Level AA, and GOV.UK Design System v5.x. Data sourced from live uktradeinfo.com/find-commodity-data page (fetched 23 Feb 2026) and WCO Harmonized System 2022 section definitions. Option E pattern adapted from live Defra fish exports service (manage-fish-exports.service.gov.uk). Drill-down hierarchy demonstrated for Chapter 01 through 4-digit headings, 6-digit subheadings, and 8-digit CN codes with illustrative trade data.
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
